version: 2
updates:
  # Elixir dependencies
  - package-ecosystem: "mix"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Rust dependencies
  - package-ecosystem: "cargo"
    directory: "/native/typster_nif"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      typst:
        patterns:
          - "typst"
          - "typst-*"
      serde:
        patterns:
          - "serde"
          - "serde_*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
